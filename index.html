uot;&quot;]}]}],[0,{&quot;title&quot;:[0,&quot;Stockage intelligent&quot;],&quot;description&quot;:[0,&quot;Architecture événementielle optimisée : 8h de production = 2 enregistrements, pas 28 800. Base TimescaleDB standard — n&#39;importe quel outil BI ou script peut interroger vos données en SQL.&quot;],&quot;image&quot;:[0,{&quot;src&quot;:[0,&quot;/images/263b3984-ad33-4047-93ea-359b9f5d2a4e.png&quot;],&quot;alt&quot;:[0,&quot;&quot;]}]}],[0,{&quot;title&quot;:[0,&quot;Analyse et dashboards&quot;],&quot;description&quot;:[0,&quot;TRS, Pareto des arrêts, MTTR, MTBF — tout est calculé et affiché automatiquement. Dashboards web standards inclus + possibilité de dashboards sur-mesure via Grafana.&quot;],&quot;image&quot;:[0,{&quot;src&quot;:[0,&quot;/images/iap-dashboard.png&quot;],&quot;alt&quot;:[0,&quot;&quot;]}]}]]]}]}],[0,{&quot;meta&quot;:[0,{&quot;component&quot;:[0,&quot;blocks/content/faq/Faq001&quot;],&quot;section&quot;:[0,&quot;home/faq001&quot;]}],&quot;data&quot;:[0,{&quot;sectionLabel&quot;:[0,&quot;04 / FAQ&quot;],&quot;title&quot;:[0,&quot;Questions fréquentes&quot;],&quot;items&quot;:[1,[[0,{&quot;question&quot;:[0,&quot;Est-ce que IAP modifie le programme de mes automates ?&quot;],&quot;answer&quot;:[0,&quot;Non. IAP est 100% lecture seule. La plateforme lit les données de vos automates (S7, Modbus, OPC-UA) mais ne les commande jamais. Pas de pilotage machine, pas d&#39;ordres de fabrication — uniquement de l&#39;analyse de performance. Zéro risque pour votre production.&quot;]}],[0,{&quot;question&quot;:[0,&quot;Combien de temps faut-il pour installer IAP ?&quot;],&quot;answer&quot;:[0,&quot;L&#39;installation complète prend généralement moins d&#39;une semaine : un audit sur site (½ journée), l&#39;installation et la configuration de la passerelle (2 à 5 jours), une formation des utilisateurs (½ journée), puis un suivi de 30 jours. Vous avez vos premiers indicateurs TRS dès la première semaine.&quot;]}],[0,{&quot;question&quot;:[0,&quot;Mes données restent-elles chez moi ?&quot;],&quot;answer&quot;:[0,&quot;Oui. IAP est 100% on-premise. Toutes vos données restent sur votre réseau local. Aucun transfert vers le cloud, aucune dépendance externe. La base de données PostgreSQL/TimescaleDB est standard — vous pouvez interroger vos données avec n&#39;importe quel outil BI, script Python ou connecteur ERP.&quot;]}],[0,{&quot;question&quot;:[0,&quot;Quel est le retour sur investissement ?&quot;],&quot;answer&quot;:[0,&quot;Les résultats sont mesurables dès les 3 premiers mois : 5 à 15% d&#39;amélioration du TRS, élimination de la saisie manuelle (1-2h/poste/jour économisées), et une réduction des arrêts non planifiés. Pour une usine de 20 machines, le ROI typique est de 4× à 9× dès la première année.&quot;]}],[0,{&quot;question&quot;:[0,&quot;Quels types de machines sont compatibles ?&quot;],&quot;answer&quot;:[0,&quot;IAP se connecte à tous les automates disposant d&#39;une interface Ethernet industrielle : Siemens S7 (300, 1200, 1500), Modbus TCP, OPC-UA. Si vos machines ont des automates programmables, IAP peut s&#39;y connecter. L&#39;offre est adaptée pour les usines de 5 à 200 machines.&quot;]}],[0,{&quot;question&quot;:[0,&quot;Quelle est la différence avec les solutions SaaS comme MachineMetrics ou Factbird ?&quot;],&quot;answer&quot;:[0,&quot;IAP est 5 à 10× moins cher que les solutions SaaS du marché, et surtout 100% on-premise. Pas de données envoyées dans le cloud, pas de dépendance à un service externe. Les alternatives SaaS coûtent ~200-300 €/machine/mois. IAP propose un forfait d&#39;installation (3K-15K €) + un abonnement mensuel (500-2 000 €/mois) pour l&#39;ensemble de votre parc.&quot;]}]]]}]}],[0,{&quot;meta&quot;:[0,{&quot;component&quot;:[0,&quot;blocks/content/cta/Cta001&quot;],&quot;section&quot;:[0,&quot;home/cta001&quot;]}],&quot;data&quot;:[0,{&quot;testimonial&quot;:[0,{&quot;quote&quot;:[0,&quot;En 3 semaines, on avait notre premier tableau de bord TRS en temps réel. On a identifié 15%
